name: AnyArch-AppImage (Nightly)
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true
on:
# # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # #
# comment these two out to enable nightly builds, This sets the variable DEVEL_RELEASE=1 for  #
# get-dependencies.sh to make a nightly release, this will make a release with 'nightly' tag  #
# # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # #
#  schedule:
#    - cron: "0 5 1/2 * *"
  workflow_dispatch: {}

jobs:
  build:
    name: "${{ matrix.arch }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64
          - arm32v7
          - ppc64
          - ppc64le
          #- pentium4
        include:
          - arch: x86_64
            platform: linux/amd64
            image: ghcr.io/pkgforge-dev/archlinux:latest
            native: true
          - arch: aarch64
            platform: linux/arm64
            image: danhunsaker/archlinuxarm:latest
            cross: true
          - arch: arm32v7
            platform: linux/arm/v7
            image: danhunsaker/archlinuxarm:latest
            cross: true
          - arch: ppc64
            platform: linux/ppc64
            image: kth5/archpower:latest-ppc64
            cross: true
          - arch: ppc64le
            platform: linux/ppc64le
            image: kth5/archpower:latest-ppc64le
            cross: true
          #- arch: pentium4
          #  image: jonathonf/archlinux32:pentium4
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare cross sysroot
        if: matrix.cross == true
        run: |
          SYSDIR=/tmp/${{ matrix.arch }}-sysroot
          DOCKER_OPTS="${{ matrix.platform && format('--platform {0}', matrix.platform) || '' }}"
          # shellcheck disable=SC2086
          docker run -d $DOCKER_OPTS --name cross-root ${{ matrix.image }} cat
          if [ -f sysroot-packages.txt ]; then
            docker exec cross-root pacman -Sy --noconfirm archlinux-keyring 2>/dev/null || true
            docker exec cross-root pacman -S --noconfirm $(cat sysroot-packages.txt) || true
          fi
          mkdir -p "$SYSDIR"
          docker kill cross-root >/dev/null 2>&1 || true
          docker export cross-root | tar -C "$SYSDIR" -xf -
          docker rm -f cross-root

      - name: Download cross toolchain
        if: matrix.cross == true
        run: |
          case "${{ matrix.arch }}" in
            aarch64)
              BOOTLIN_ARCH=aarch64
              BOOTLIN_TARGET=aarch64-linux-gnu
              CLANG_TARGET=aarch64-linux-gnu
              ;;
            ppc64)
              BOOTLIN_ARCH=powerpc64-power8
              BOOTLIN_TARGET=powerpc64-buildroot-linux-gnu
              CLANG_TARGET=powerpc64-linux-gnu
              ;;
            ppc64le)
              BOOTLIN_ARCH=powerpc64le-power8
              BOOTLIN_TARGET=powerpc64le-buildroot-linux-gnu
              CLANG_TARGET=powerpc64le-linux-gnu
              ;;
            arm32v7)
              BOOTLIN_ARCH=armv7-eabihf
              BOOTLIN_TARGET=arm-buildroot-linux-gnueabihf
              CLANG_TARGET=arm-linux-gnueabihf
              ;;
          esac
          TOOLDIR=$(mktemp -d)
          BINDIR=/tmp/${{ matrix.arch }}-bin
          SYSDIR=/tmp/${{ matrix.arch }}-sysroot
          mkdir -p "$BINDIR"
          curl -sL "https://toolchains.bootlin.com/downloads/releases/toolchains/${BOOTLIN_ARCH}/tarballs/${BOOTLIN_ARCH}--glibc--bleeding-edge-2025.08-1.tar.xz" \
            | tar -xJ --strip-components=1 -C "$TOOLDIR"
          for tool in "$TOOLDIR/bin/${BOOTLIN_TARGET}-"*; do
            [ -f "$tool" ] || continue
            base=$(basename "$tool")
            newname=$(echo "$base" | sed 's/buildroot-//')
            cp -L "$tool" "$BINDIR/$newname"
          done
          mkdir -p "$SYSDIR/usr/lib/gcc/$CLANG_TARGET/15.1.0"
          cp "$TOOLDIR/lib/gcc/$BOOTLIN_TARGET/15.1.0/crt"*.o "$SYSDIR/usr/lib/gcc/$CLANG_TARGET/15.1.0/" 2>/dev/null || true
          cp "$TOOLDIR/lib/gcc/$BOOTLIN_TARGET/15.1.0/libgcc"* "$SYSDIR/usr/lib/gcc/$CLANG_TARGET/15.1.0/" 2>/dev/null || true
          cp -r "$TOOLDIR/$BOOTLIN_TARGET/lib/libgcc_s"* "$SYSDIR/usr/lib/" 2>/dev/null || true
          rm -rf "$TOOLDIR"

      - name: Create cross-compiler wrappers
        if: matrix.cross == true
        run: |
          mkdir -p /tmp/cross-wrappers
          case "${{ matrix.arch }}" in
            ppc64)
              {
                echo '#!/bin/sh'
                echo 'exec clang --target=powerpc64-linux-gnu -mabi=elfv2 \'
                echo '  --sysroot=/sysroot \'
                echo '  "$@"'
              } > /tmp/cross-wrappers/powerpc64-linux-gnu-gcc
              {
                echo '#!/bin/sh'
                echo 'exec clang++ --target=powerpc64-linux-gnu -mabi=elfv2 \'
                echo '  --sysroot=/sysroot \'
                echo '  "$@"'
              } > /tmp/cross-wrappers/powerpc64-linux-gnu-g++
              chmod +x /tmp/cross-wrappers/powerpc64-linux-gnu-g*
              ;;
            ppc64le)
              {
                echo '#!/bin/sh'
                echo 'exec clang --target=powerpc64le-linux-gnu \'
                echo '  --sysroot=/sysroot \'
                echo '  "$@"'
              } > /tmp/cross-wrappers/powerpc64le-linux-gnu-gcc
              {
                echo '#!/bin/sh'
                echo 'exec clang++ --target=powerpc64le-linux-gnu \'
                echo '  --sysroot=/sysroot \'
                echo '  "$@"'
              } > /tmp/cross-wrappers/powerpc64le-linux-gnu-g++
              chmod +x /tmp/cross-wrappers/powerpc64le-linux-gnu-g*
              ;;
            aarch64)
              {
                echo '#!/bin/sh'
                echo 'exec clang --target=aarch64-linux-gnu \'
                echo '  --sysroot=/sysroot \'
                echo '  "$@"'
              } > /tmp/cross-wrappers/aarch64-linux-gnu-gcc
              {
                echo '#!/bin/sh'
                echo 'exec clang++ --target=aarch64-linux-gnu \'
                echo '  --sysroot=/sysroot \'
                echo '  "$@"'
              } > /tmp/cross-wrappers/aarch64-linux-gnu-g++
              chmod +x /tmp/cross-wrappers/aarch64-linux-gnu-g*
              ;;
            arm32v7)
              {
                echo '#!/bin/sh'
                echo 'exec clang --target=arm-linux-gnueabihf \'
                echo '  --sysroot=/sysroot \'
                echo '  "$@"'
              } > /tmp/cross-wrappers/arm-linux-gnueabihf-gcc
              {
                echo '#!/bin/sh'
                echo 'exec clang++ --target=arm-linux-gnueabihf \'
                echo '  --sysroot=/sysroot \'
                echo '  "$@"'
              } > /tmp/cross-wrappers/arm-linux-gnueabihf-g++
              chmod +x /tmp/cross-wrappers/arm-linux-gnueabihf-g*
              ;;
          esac

      - name: Build in container
        if: matrix.cross != true
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e GITHUB_REPOSITORY="${{ github.repository }}" \
            -e DEVEL_RELEASE=1 \
            -e MATRIX_ARCH="${{ matrix.arch }}" \
            ${{ matrix.platform && format('--platform {0}', matrix.platform) || '' }} \
            ${{ matrix.entrypoint && format('--entrypoint {0}', matrix.entrypoint) || '' }} \
            ${{ matrix.image }} \
            ${{ matrix.entrypoint && '-c' || 'sh -c' }} "
              # Disable pacman sandbox (Landlock unavailable under QEMU)
              sed -i '/^\[options\]/a DisableSandbox' /etc/pacman.conf 2>/dev/null || \
                echo 'DisableSandbox' >> /etc/pacman.conf
              sed -i 's/^DownloadUser/#DownloadUser/' /etc/pacman.conf 2>/dev/null || true
              # Per-arch tuning (use MATRIX_ARCH since uname -m may lie under QEMU)
              case \"\$MATRIX_ARCH\" in
                pentium4)
                  printf '%s\n' 'Server = https://mirror.math.princeton.edu/pub/archlinux32/pentium4/\$repo' \
                    'SigLevel = Never' > /etc/pacman.d/mirrorlist
                  sed -i 's/^CFLAGS=.*/CFLAGS=\"-march=pentium4 -mtune=pentium4 -O2 -pipe -fstack-protector-strong -fno-plt\"/' /etc/makepkg.conf 2>/dev/null || true
                  sed -i 's/^CXXFLAGS=.*/CXXFLAGS=\"-march=pentium4 -mtune=pentium4 -O2 -pipe -fstack-protector-strong -fno-plt\"/' /etc/makepkg.conf 2>/dev/null || true
                  pacman-key --init 2>/dev/null || true
                  pacman-key --populate archlinux32 2>/dev/null || true
                  ;;
                *)
                  pacman-key --init 2>/dev/null || true
                  pkgs='base-devel git jq patchelf strace wget zsync unzip 7zip \
                    freetype2 libx11 libxrandr libxss nspr nss nss-mdns \
                    pulseaudio pulseaudio-alsa xorg-server-xvfb'
                  ;;
              esac
              if [ -z \"\${SKIP_UPGRADE:-}\" ]; then
                pacman -Sy --noconfirm 2>/dev/null || true
                pacman -S --noconfirm archlinux-keyring 2>/dev/null || true
                pacman -Su --noconfirm 2>/dev/null || true
              fi
              # Add curl to main pkgs so it downgrades in the first transaction
              # alongside deps, avoiding a hung second transaction under QEMU.
              pkgs=\"\$pkgs curl\"
              if ! pacman -S --noconfirm \$PACMAN_IGNORE \$pkgs; then
                echo 'Normal install failed under QEMU, trying download+extract...'
                pacman -Sw --noconfirm \$PACMAN_IGNORE \$pkgs || true
                for pkg in /var/cache/pacman/pkg/*.pkg.tar.*; do
                  [ -f \"\$pkg\" ] && tar --zstd -xf \"\$pkg\" -C / 2>/dev/null || tar -xf \"\$pkg\" -C / 2>/dev/null || true
                done
                ldconfig 2>/dev/null || true
              fi
              # Ensure nettle/wget/curl are consistent (QEMU DB workaround)
              pacman -S --noconfirm nettle wget curl 2>/dev/null || true
              ldconfig 2>/dev/null || true
              # Download AnyLinux tools (try each method independently)
              TOOL_REPO='https://raw.githubusercontent.com/Link4Electronics/AnyArch-AppImages/main/useful-tools'
              for tool in quick-sharun get-debloated-pkgs make-aur-package; do
                if command -v busybox >/dev/null 2>&1; then
                  busybox wget -q \"\$TOOL_REPO/\$tool.sh\" -O \"/usr/local/bin/\$tool\" 2>/dev/null || true
                fi
                if [ ! -s \"/usr/local/bin/\$tool\" ] && command -v curl >/dev/null 2>&1; then
                  curl -sLo \"/usr/local/bin/\$tool\" \"\$TOOL_REPO/\$tool.sh\" || true
                fi
                if [ ! -s \"/usr/local/bin/\$tool\" ] && command -v wget >/dev/null 2>&1; then
                  wget -q \"\$TOOL_REPO/\$tool.sh\" -O \"/usr/local/bin/\$tool\" || true
                fi
                chmod +x \"/usr/local/bin/\$tool\" 2>/dev/null || true
              done
              echo Architecture: \$(uname -m)
              /bin/sh ./get-dependencies.sh
              /bin/sh ./make-appimage.sh
            "

      - name: Build in container (cross-compile)
        if: matrix.cross == true
        run: |
           CROSS_BIN=""
           case "${{ matrix.arch }}" in
             aarch64|ppc64|ppc64le|arm32v7) CROSS_BIN="-v /tmp/${{ matrix.arch }}-bin:/cross-bin:ro";;
           esac
           docker run --rm \
             -v "${{ github.workspace }}:/workspace" \
             -v "/tmp/${{ matrix.arch }}-sysroot:/sysroot:ro" \
             $CROSS_BIN \
             -v "/tmp/cross-wrappers:/wrappers:ro" \
             -w /workspace \
             -e GITHUB_REPOSITORY="${{ github.repository }}" \
             -e DEVEL_RELEASE=1 \
             -e MATRIX_ARCH="${{ matrix.arch }}" \
             archlinux:latest sh -c "
              pacman -Sy --noconfirm 2>/dev/null || true
              pacman -S --noconfirm archlinux-keyring 2>/dev/null || true
              pacman -Su --noconfirm 2>/dev/null || true
              pacman -S --noconfirm clang base-devel git patchelf strace wget zsync unzip 7zip curl
              case \"\$MATRIX_ARCH\" in
                aarch64)
                  for tool in /cross-bin/aarch64-linux-gnu-*; do
                    ln -sf \"\$tool\" \"/usr/local/bin/\$(basename \"\$tool\")\"
                  done
                  export CC=aarch64-linux-gnu-gcc
                  export CXX=aarch64-linux-gnu-g++
                  ;;
                arm32v7)
                  for tool in /cross-bin/arm-linux-gnueabihf-*; do
                    ln -sf \"\$tool\" \"/usr/local/bin/\$(basename \"\$tool\")\"
                  done
                  export CC=arm-linux-gnueabihf-gcc
                  export CXX=arm-linux-gnueabihf-g++
                  ;;
                ppc64)
                  for tool in /cross-bin/powerpc64-linux-gnu-*; do
                    ln -sf \"\$tool\" \"/usr/local/bin/\$(basename \"\$tool\")\"
                  done
                  export CC=powerpc64-linux-gnu-gcc
                  export CXX=powerpc64-linux-gnu-g++
                  ;;
                ppc64le)
                  for tool in /cross-bin/powerpc64le-linux-gnu-*; do
                    ln -sf \"\$tool\" \"/usr/local/bin/\$(basename \"\$tool\")\"
                  done
                  export CC=powerpc64le-linux-gnu-gcc
                  export CXX=powerpc64le-linux-gnu-g++
                  ;;
              esac
              export PATH=\"/wrappers:\$PATH\"
              echo \"Using CC=\$CC\"
              echo \"Using CXX=\$CXX\"
              TOOL_REPO='https://raw.githubusercontent.com/Link4Electronics/AnyArch-AppImages/main/useful-tools'
              for tool in quick-sharun get-debloated-pkgs make-aur-package; do
                curl -sLo \"/usr/local/bin/\$tool\" \"\$TOOL_REPO/\$tool.sh\" || true
                chmod +x \"/usr/local/bin/\$tool\" 2>/dev/null || true
              done
              echo \"Architecture: \$MATRIX_ARCH (cross-compiled)\"
              /bin/sh ./get-dependencies.sh
              /bin/sh ./make-appimage.sh
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppImage-${{ matrix.arch }}
          path: dist
          if-no-files-found: warn

  release:
    if: ${{ github.ref_name == 'main' }}
    needs: [build]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: AppImage-*
          merge-multiple: true
        continue-on-error: true
      - name: Release Nightly AppImage
        uses: pkgforge-dev/make-nightly-appimage-release@17cbe90fc0796286e424619a54a82a3a880efe4c # v1.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
